name: 🔎 Quality Check
on:
  pull_request:

jobs:
  quality:
    name: ✨Biome
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 🚚 Checkout
        uses: actions/checkout@v6

      - name: 🛠️ Setup
        uses: ./.github/actions/setup

      - name: ✨Run Biome
        run: pnpm run format
