name: 📸 Update Snapshots
on:
  issue_comment:
    types:
      - created

jobs:
  update:
    name: 📸 Update Snapshots
    if: ${{ github.event.issue.pull_request && contains(github.event.comment.body, 'update snapshots') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    container:
      image: mcr.microsoft.com/playwright:v1.57.0-noble
      options: --user 1001
    steps:
      - name: 👀 Acknowledge Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          run: |
            curl --request POST \
              --url "https://api.github.com/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
              --header "Authorization: Bearer $GH_TOKEN" \
              --header "Accept: application/vnd.github+json" \
              --data '{"content":"+1"}'

      - name: 🚚 Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: refs/pull/${{ github.event.issue.number }}/head

      - name: 🛠️ Setup
        uses: ./.github/actions/setup

      - name: 📸 Update Snapshots
        run: pnpm run e2e -- --update-snapshots

      - name: 🔄 Commit and Push Changes
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENTER_NAME="${{ github.event.comment.user.login }}"
          COMMENTER_ID="${{ github.event.comment.user.id }}"
          
          git config --global user.name "$COMMENTER_NAME"
          git config --global user.email "$COMMENTER_ID+$COMMENTER_NAME@users.noreply.github.com"
          
          if [[ -n $(git status -s) ]]; then
            git add .
            git commit -m "chore: update playwright snapshots"
            git push
          
            curl --request POST \
              --url "https://api.github.com/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
              --header "Authorization: Bearer $GH_TOKEN" \
              --header "Accept: application/vnd.github+json" \
              --data '{"content":"rocket"}'
          else
            curl --request POST \
              --url "https://api.github.com/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
              --header "Authorization: Bearer $GH_TOKEN" \
              --header "Accept: application/vnd.github+json" \
              --data '{"content":"eyes"}'
          fi
      - name: ❌ Notify Failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl --request POST \
            --url "https://api.github.com/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            --data '{"content":"confused"}'
