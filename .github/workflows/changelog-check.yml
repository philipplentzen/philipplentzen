name: 📦 Changelog Check
on:
  pull_request:
    branches:
      - main

jobs:
  check:
    name: 📝 Changeset
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: 🚚 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🛠️ Setup
        uses: ./.github/actions/setup

      - name: 🔍 Verify Changeset Exists
        run: pnpm changeset status --since=main
