name: 🔎 Quality Check
on:
  pull_request:

jobs:
  quality:
    name: ✨Biome
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 🚚 Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: 🛠️ Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest
      - name: ✨Run Biome
        run: biome ci .
