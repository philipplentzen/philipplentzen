name: 🔎 Quality Check
on:
  pull_request:

jobs:
  quality:
    name: ✨Biome
    runs-on: ubuntu-latest
    env:
      TURBO_API: ${{ secrets.TURBO_API }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    permissions:
      contents: read
    steps:
      - name: 🚚 Checkout
        uses: actions/checkout@v6

      - name: 🛠️ Setup
        uses: ./.github/actions/setup

      - name: ✨Run Biome
        run: pnpm run format
