name: 🧪 Tests
on:
  pull_request:

jobs:
  playwright:
    name: 🎭 e2e
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.57.0-noble
      options: --user 1001
    steps:
      - name: 🚚 Checkout
        uses: actions/checkout@v5

      - name: 🛠️ Setup
        uses: ./.github/actions/setup

      - name: 🎭 Run e2e tests
        run: pnpm run e2e